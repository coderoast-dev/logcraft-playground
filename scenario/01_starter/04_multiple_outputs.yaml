# Starter 04 — Multiple Outputs
# Same logs written to two files simultaneously, each in a different format.
# In LogCraft Lab the file sinks are redirected to the UI's drain and labelled by name.
# Concepts: multiple outputs, format per sink, independent write telemetry
scenario:
  name: multiple-outputs
  duration: 2m

  outputs:
    - name: log-aggregator
      type: file
      path: /tmp/logcraft_json.log
      format: json
    - name: siem-backend
      type: file
      path: /tmp/logcraft_clf.log
      format: clf

  agents:
    - name: nginx
      type: web_server
      rate: 3/s
      error_rate: 0.03
      message_template: "{method} {path} -> {status_code}"
      fields:
        - name: method
          generator: weighted_choice
          values: [GET, POST, PUT, DELETE]
          weights: [60, 25, 10, 5]
        - name: path
          generator: choice
          values: [/api/users, /api/orders, /health, /static/main.js]
        - name: status_code
          generator: weighted_choice
          values: ["200", "301", "404", "500"]
          weights: [82, 5, 8, 5]
        - name: bytes_sent
          generator: range
          min: 200
          max: 50000
          integer: true
        - name: user_agent
          generator: choice
          values: ["Mozilla/5.0 Chrome/120", "curl/8.4.0", "Python-requests/2.31"]
        - name: host
          generator: static
          value: "web-prod-01"
        - name: pid
          generator: range
          min: 1000
          max: 9999
          integer: true
