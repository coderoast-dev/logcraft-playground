# Starter 06 — Multiple Formats
# Same logs written to three files simultaneously, each in a different format.
# In LogCraft Lab the file sinks are redirected to the UI's drain and labelled by name.
# Concepts: file sinks, multiple outputs, format per sink (json, ecs, kv)
scenario:
  name: multiple-formats
  duration: 2m

  outputs:
    - name: log-aggregator
      type: file
      path: /tmp/logcraft_json.log
      format: json
    - name: alert-webhook
      type: file
      path: /tmp/logcraft_ecs.log
      format: ecs
    - name: siem-backend
      type: file
      path: /tmp/logcraft_kv.log
      format: kv

  agents:
    - name: api-gateway
      type: web_server
      rate: 5/s
      error_rate: 0.04
      message_template: "{method} {path} -> {status_code}"
      fields:
        - name: method
          generator: weighted_choice
          values: [GET, POST, PUT, DELETE]
          weights: [60, 25, 10, 5]
        - name: path
          generator: choice
          values: [/api/users, /api/orders, /api/products, /health]
        - name: status_code
          generator: weighted_choice
          values: ["200", "201", "404", "500"]
          weights: [80, 10, 7, 3]
        - name: bytes_sent
          generator: range
          min: 200
          max: 50000
          integer: true
