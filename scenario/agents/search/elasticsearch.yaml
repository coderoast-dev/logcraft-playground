# Elasticsearch node agent — models an ES cluster node.
agent:
  name: elasticsearch
  type: search_engine
  rate: 200/s
  error_rate: 0.008
  contention:
    max_connections: 300
    queue_latency_ms: [1, 30]
  latency_ms:
    distribution: percentile
    p50: 10
    p95: 80
    p99: 500
  message_template: "{operation} /{index}/_doc: {status} ({shard_info})"
  fields:
    - name: operation
      generator: weighted_choice
      values: [index, search, bulk, delete, get, scroll]
      weights: [30, 25, 20, 5, 15, 5]
    - name: index
      generator: weighted_choice
      values: [logs-2026.03, metrics-2026.03, traces-2026.03, apm-2026.03]
      weights: [40, 25, 20, 15]
    - name: status
      generator: weighted_choice
      values: ["200", "201", "400", "429", "500", "503"]
      weights: [70, 10, 5, 8, 4, 3]
    - name: shard_info
      generator: weighted_choice
      values: ["primary", "replica", "relocating"]
      weights: [60, 35, 5]
    - name: docs_affected
      generator: range
      min: 1
      max: 10000
      integer: true
    - name: took_ms
      generator: range
      min: 1
      max: 2000
      integer: true
