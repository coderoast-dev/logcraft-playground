agent:
  name: nginx
  type: web_server
  rate_per_second: 100
  error_rate: 0.02
  message_template: "{method} {path} -> {status_code}"
  fields:
    - name: method
      generator: weighted_choice
      values: ["GET", "POST", "PUT", "DELETE"]
      weights: [65, 20, 10, 5]
    - name: path
      generator: choice
      values: ["/api/users", "/api/orders", "/health", "/api/products"]
    - name: status_code
      generator: weighted_choice
      values: ["200", "301", "404", "500"]
      weights: [80, 5, 10, 5]
    - name: response_time_ms
      generator: range
      min: 1
      max: 300
      integer: true
