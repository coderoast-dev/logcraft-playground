# Benchmarks 01 — High Throughput
# Single agent at 10,000 records/s for 60 seconds.
# Run this to characterize your pipeline's maximum sustainable ingestion rate.
# Concepts: high rate, pipeline tuning (ring_capacity, batch sizes, backpressure: drop)

scenario:
  name: high-throughput
  duration: 60s

  # Pipeline tuning for maximum throughput
  pipeline:
    num_shards: 0        # auto: one shard per CPU core
    ring_capacity: 65536
    min_batch: 64
    max_batch: 1024
    backpressure: drop   # drop records if the pipeline is full, never block the simulation

  agents:
    - name: fast-api
      type: web_server
      rate: 10000/s
      error_rate: 0.01
      message_template: "{method} {path} {status_code} {latency_ms}ms"
      fields:
        - name: method
          generator: weighted_choice
          values: [GET, POST]
          weights: [80, 20]
        - name: path
          generator: weighted_choice
          values: [/api/v1/data, /api/v1/query, /health]
          weights: [60, 35, 5]
        - name: status_code
          generator: weighted_choice
          values: ["200", "400", "500"]
          weights: [95, 4, 1]
        - name: latency_ms
          generator: range
          min: 1
          max: 50
          integer: true

  outputs:
    - name: stream
      type: console
      format: json
