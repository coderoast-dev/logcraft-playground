# Failures 03 — Memory Pressure
# Queue depth builds up over time; when it crosses thresholds latency and errors climb.
# Models a worker that never quite catches up — a gradual degradation, not a sudden spike.
# Concepts: state variables (growth_per_request), effects (threshold-triggered behavior)

scenario:
  name: memory-pressure
  duration: 8m

  agents:
    - name: app-server
      type: worker
      rate: 60/s
      error_rate: 0.005
      latency_ms:
        distribution: normal
        mean: 40
        stddev: 15
      # queue_depth and memory_used grow with each request (decay is implicit via max ceiling)
      state:
        queue_depth:
          initial: 0.0
          max: 1.0
          growth_per_request: 0.0005    # fills up over ~3 minutes at 60/s
        memory_used:
          initial: 0.2
          max: 1.0
          growth_per_request: 0.0002
      # Behavior changes as state variables cross thresholds
      effects:
        - when: "queue_depth > 0.7"
          latency_multiplier: 5.0
        - when: "queue_depth > 0.9"
          latency_multiplier: 15.0
          error_rate: 0.25
        - when: "memory_used > 0.85"
          error_rate: 0.40
      message_template: "{job} queue_depth={queue_depth} mem={memory_used}"
      fields:
        - name: job
          generator: weighted_choice
          values: [process_order, send_email, generate_report, sync_inventory]
          weights: [50, 25, 15, 10]
        # These are static placeholders; real values come from the state engine
        - name: queue_depth
          generator: static
          value: "0.00"
        - name: memory_used
          generator: static
          value: "0.20"

    - name: health-monitor
      type: monitor
      rate: 1/s    # one health probe per second
      message_template: "health check: {status}"
      fields:
        - name: status
          generator: weighted_choice
          values: [ok, degraded, critical]
          weights: [70, 20, 10]

  outputs:
    - name: stream
      type: console
      format: json
